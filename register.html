<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Créer un compte — BCW Suivi</title>
  <meta name="theme-color" content="#09529A" />
  <link rel="icon" href="assets/favicon.png" type="image/png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />

  <link rel="stylesheet" href="css/style.css" />

<body>

  <div id="view-register" class="view active">
    <div class="login-container">

      <div class="login-brand">

        <h1>Créer mon compte</h1>

      <div class="login-form reg-success">
        <div class="success-icon">🔒</div>
        <h2>Inscription fermée</h2>
        <p class="success-sub">
          BCW Suivi fonctionne désormais en accès sur invitation.
          Un administrateur doit d'abord créer votre compte.
        </p>
        <a href="index.html" class="btn btn-primary btn-full" style="margin-top:24px;">Retour à la connexion</a>
      </div>

    </div>
  </div>
