<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Créer un compte — BCW Suivi</title>
  <meta name="theme-color" content="#09529A" />
  <link rel="icon" href="assets/favicon.png" type="image/png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <div id="view-register" class="view active">
    <div class="login-container">

      <div class="login-brand">
        <div class="login-logo">BCW</div>
        <h1>Créer mon compte</h1>
        <p class="login-tagline">Plateforme de suivi pédagogique</p>
      </div>

      <!-- ÉTAPE 1 : Choix du rôle -->
      <div id="step-role" class="reg-step">
        <p class="reg-step-label">Je suis…</p>
        <div class="role-cards">
          <button class="role-card" data-role="eleve" type="button">
            <span class="role-icon">👩‍🎓</span>
            <span class="role-label">Élève</span>
            <span class="role-sub">J'ai des cours avec BCW</span>
          </button>
          <button class="role-card" data-role="parent" type="button">
            <span class="role-icon">👨‍👧</span>
            <span class="role-label">Parent</span>
            <span class="role-sub">Mon enfant suit des cours</span>
          </button>
        </div>
        <p class="reg-login-link">Déjà un compte ? <a href="index.html">Se connecter</a></p>
      </div>

      <!-- ÉTAPE 2 : Formulaire -->
      <div id="step-form" class="reg-step" hidden>
        <div class="login-form">
          <button id="btn-back-role" class="btn-back" type="button">← Retour</button>
          <p id="reg-role-label" class="reg-role-badge"></p>

          <form id="register-form" autocomplete="on" novalidate>
            <div class="form-group">
              <label for="reg-name">Nom complet</label>
              <input type="text" id="reg-name" name="name" required autocomplete="name" placeholder="Prénom Nom" />
            </div>

            <div class="form-group">
              <label for="reg-email">Email</label>
              <input type="email" id="reg-email" name="email" required autocomplete="email" placeholder="votre@email.com" />
            </div>

            <!-- Champ visible uniquement pour les parents -->
            <div class="form-group" id="field-child" hidden>
              <label for="reg-child-email">Email de votre enfant</label>
              <input type="email" id="reg-child-email" name="child_email" autocomplete="off" placeholder="email.enfant@exemple.com" />
              <p class="field-hint">Doit correspondre à l'email enregistré par le prof.</p>
            </div>

            <div class="form-group">
              <label for="reg-password">Mot de passe</label>
              <div class="password-wrapper">
                <input type="password" id="reg-password" name="password" required autocomplete="new-password" placeholder="Minimum 6 caractères" />
                <button type="button" class="password-toggle" id="toggle-reg-password" aria-label="Voir le mot de passe">
                  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                </button>
              </div>
            </div>

            <div class="form-group">
              <label for="reg-confirm">Confirmer le mot de passe</label>
              <input type="password" id="reg-confirm" name="confirm" required autocomplete="new-password" placeholder="Répétez le mot de passe" />
            </div>

            <button type="submit" class="btn btn-primary btn-full" id="reg-btn">Créer mon compte</button>
            <p id="reg-error" class="form-error" hidden></p>
          </form>
        </div>
      </div>

      <!-- ÉTAPE 3 : Succès -->
      <div id="step-success" class="reg-step" hidden>
        <div class="login-form reg-success">
          <div class="success-icon">✅</div>
          <h2>Compte créé !</h2>
          <p id="success-msg" class="success-sub"></p>
          <a href="index.html" class="btn btn-primary btn-full" style="margin-top:24px;">Se connecter</a>
        </div>
      </div>

    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.49.2/dist/umd/supabase.min.js"></script>
  <script src="js/config.js"></script>
  <script src="js/register.js"></script>
</body>
</html>
